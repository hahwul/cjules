name: cjules
version: 0.1.0
description: |
  A power-user CLI for the Jules API in Crystal.
  Multi-account auth, bulk ops, watch mode, gitPatch extraction,
  markdown activity export, and pipe-friendly outputs.

authors:
  - hahwul <hahwul@gmail.com>

targets:
  cjules:
    main: src/main.cr

crystal: '>= 1.20.0'

license: MIT
